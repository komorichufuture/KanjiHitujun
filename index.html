<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字学習アプリ — 書き順 & クイズ</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #dbeafe;
    --accent: #f59e0b;
    --green: #16a34a;
    --green-light: #dcfce7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --radius: 14px;
    --transition: 0.2s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 60%, #3b82f6 100%);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(37,99,235,0.25);
    flex-shrink: 0;
  }
  header .logo { font-size: 32px; line-height: 1; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.04em; }
  header .subtitle { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .header-spacer { flex: 1; }
  /* ===== NAV TABS ===== */
  .nav-tabs {
    display: flex;
    background: #f1f5f9;
    border-bottom: 2px solid var(--border);
    padding: 0 16px;
    gap: 0;
    flex-shrink: 0;
  }
  .nav-tab {
    padding: 11px 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-muted);
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: var(--transition);
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .nav-tab:hover { color: var(--primary); }
  .nav-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    background: white;
  }
  /* ===== VIEWS ===== */
  .view { display: none; flex: 1; overflow: hidden; }
  .view.active { display: flex; }
  /* ===== STROKE ORDER VIEW ===== */
  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 106px);
  }
  .sidebar {
    width: 310px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .search-box {
    padding: 12px 12px 9px;
    background: #f1f5f9;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .search-input-wrap {
    display: flex;
    align-items: center;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0 10px;
    gap: 8px;
  }
  .search-input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
  .search-input-wrap svg { color: var(--text-muted); flex-shrink: 0; }
  .search-input {
    border: none; outline: none; padding: 8px 0;
    font-size: 14px; width: 100%;
    background: transparent; color: var(--text); font-family: inherit;
  }
  .grade-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .grade-tab {
    padding: 4px 9px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: var(--transition);
    color: var(--text-muted);
    font-weight: 600;
  }
  .grade-tab:hover { border-color: var(--primary); color: var(--primary); }
  .grade-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
  .kanji-count { font-size: 11px; color: var(--text-muted); text-align: right; padding: 3px 12px 5px; border-bottom: 1px solid var(--border); }
  .kanji-grid {
    overflow-y: auto; flex: 1; padding: 8px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
    gap: 5px; align-content: start;
  }
  .kanji-card {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 9px; border: 1.5px solid var(--border);
    cursor: pointer; transition: var(--transition);
    background: white; font-size: 21px; user-select: none;
  }
  .kanji-card:hover { border-color: var(--primary); background: var(--primary-light); transform: scale(1.05); }
  .kanji-card.selected { border-color: var(--primary); background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37,99,235,0.35); transform: scale(1.07); }
  .content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 24px 18px;
    overflow-y: auto; gap: 20px; background: var(--bg);
  }
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted); gap: 10px;
  }
  .empty-state .big-kanji { font-size: 90px; opacity: 0.07; line-height: 1; }
  .empty-state p { font-size: 14px; }
  .kanji-title-row { display: flex; align-items: baseline; gap: 14px; justify-content: center; }
  .kanji-display { font-size: 68px; line-height: 1; color: var(--text); }
  .grade-badge { background: var(--accent); color: white; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .readings-box {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px 20px; width: 100%; max-width: 680px;
    box-shadow: var(--shadow); display: flex; flex-wrap: wrap; gap: 16px;
  }
  .reading-group { flex: 1; min-width: 110px; }
  .reading-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; font-weight: 700; }
  .reading-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .reading-tag { background: #f1f5f9; border: 1px solid var(--border); padding: 2px 9px; border-radius: 5px; font-size: 13px; font-weight: 500; }
  .reading-tag.onyomi { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
  .reading-tag.kunyomi { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
  .reading-tag.meaning { background: #fef9c3; border-color: #fde047; color: #854d0e; font-size: 11px; }
  .animation-wrap {
    background: var(--surface); border-radius: var(--radius);
    padding: 20px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; width: 100%; max-width: 680px;
  }
  .animation-header { display: flex; width: 100%; justify-content: space-between; align-items: center; }
  .animation-header h3 { font-size: 14px; font-weight: 700; }
  .stroke-counter { font-size: 12px; color: var(--text-muted); background: #f1f5f9; padding: 3px 10px; border-radius: 20px; }
  .svg-container {
    position: relative; width: 210px; height: 210px;
    border: 2px solid var(--border); border-radius: 11px;
    background: white; display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .svg-container::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #f0f0f0; }
  .svg-container::after { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: #f0f0f0; }
  #kanjiSvgDisplay { width: 190px; height: 190px; position: relative; z-index: 1; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn {
    display: flex; align-items: center; gap: 5px;
    padding: 8px 16px; border-radius: 7px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: var(--transition); font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: white; color: var(--text); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .speed-control { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .speed-select { padding: 5px 9px; border-radius: 6px; border: 1.5px solid var(--border); font-size: 12px; font-family: inherit; background: white; cursor: pointer; outline: none; }
  .speed-select:focus { border-color: var(--primary); }
  .stroke-progress { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; max-width: 380px; }
  .stroke-dot {
    width: 19px; height: 19px; border-radius: 50%;
    border: 2px solid var(--border); background: white;
    font-size: 8px; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-weight: 700; transition: var(--transition);
  }
  .stroke-dot.done { background: var(--primary); border-color: var(--primary); color: white; }
  .stroke-dot.current { background: var(--accent); border-color: var(--accent); color: white; animation: pulse 0.7s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.25); } }
  .loading-spinner { display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--text-muted); padding: 40px; font-size: 13px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--red); background: var(--red-light); border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 12px; text-align: center; }
  .kanji-grid::-webkit-scrollbar { width: 4px; }
  .kanji-grid::-webkit-scrollbar-track { background: transparent; }
  .kanji-grid::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

  /* ===== QUIZ VIEW ===== */
  #quizView {
    flex: 1;
    display: none;
    flex-direction: row;
    overflow: hidden;
    height: calc(100vh - 106px);
  }
  #quizView.active { display: flex; }
  .quiz-sidebar {
    width: 260px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 20px;
    overflow-y: auto;
  }
  .quiz-sidebar h3 { font-size: 14px; font-weight: 700; color: var(--text); }
  .quiz-setting-group { display: flex; flex-direction: column; gap: 8px; }
  .quiz-setting-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
  .quiz-type-btn {
    padding: 9px 12px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: var(--transition);
    color: var(--text);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .quiz-type-btn:hover { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
  .quiz-type-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
  .quiz-grade-select {
    padding: 7px 10px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    font-size: 13px;
    font-family: inherit;
    background: white;
    cursor: pointer;
    outline: none;
    width: 100%;
  }
  .quiz-grade-select:focus { border-color: var(--primary); }
  .start-quiz-btn {
    padding: 11px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: var(--transition);
    box-shadow: 0 3px 10px rgba(37,99,235,0.3);
  }
  .start-quiz-btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .score-card {
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    border: 1px solid #bfdbfe;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .score-number { font-size: 32px; font-weight: 800; color: var(--primary); line-height: 1; }
  .score-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .score-detail { display: flex; justify-content: center; gap: 12px; margin-top: 8px; font-size: 12px; }
  .score-correct { color: var(--green); font-weight: 600; }
  .score-wrong { color: var(--red); font-weight: 600; }
  .progress-bar-wrap { background: #e2e8f0; border-radius: 999px; height: 6px; overflow: hidden; margin-top: 6px; }
  .progress-bar-fill { height: 100%; background: var(--primary); border-radius: 999px; transition: width 0.4s; }

  /* Quiz main area */
  .quiz-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 24px;
    overflow-y: auto;
    background: var(--bg);
    gap: 0;
  }
  .quiz-start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
  }
  .quiz-start-screen .start-icon { font-size: 72px; }
  .quiz-start-screen h2 { font-size: 22px; font-weight: 800; color: var(--text); }
  .quiz-start-screen p { font-size: 14px; color: var(--text-muted); max-width: 360px; line-height: 1.7; }

  /* Question card */
  .question-card {
    background: var(--surface);
    border-radius: 18px;
    padding: 28px 28px 24px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
  }
  .question-type-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-reading { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
  .badge-writing { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .q-progress { font-size: 12px; color: var(--text-muted); }

  .question-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
  }
  .question-prompt { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .question-kanji {
    font-size: 88px;
    line-height: 1.1;
    color: var(--text);
    text-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .question-reading-big {
    font-size: 48px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: 0.06em;
    line-height: 1.2;
  }
  .question-hint {
    font-size: 13px;
    color: var(--text-muted);
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    max-width: 340px;
    text-align: center;
  }
  .question-hint strong { color: var(--text); }

  /* Answer options */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .option-btn {
    padding: 14px 12px;
    border-radius: 11px;
    border: 2px solid var(--border);
    background: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: var(--transition);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 54px;
    line-height: 1.3;
    text-align: center;
  }
  .option-btn:not(:disabled):hover {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37,99,235,0.15);
  }
  .option-btn.correct {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green);
    pointer-events: none;
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: var(--red-light);
    color: var(--red);
    pointer-events: none;
  }
  .option-btn.dimmed {
    opacity: 0.4;
    pointer-events: none;
  }
  .option-label {
    width: 22px; height: 22px;
    background: var(--border);
    border-radius: 50%;
    font-size: 11px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--text-muted);
  }
  .option-btn.correct .option-label { background: var(--green); color: white; }
  .option-btn.wrong .option-label { background: var(--red); color: white; }

  /* Feedback */
  .feedback-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
    padding: 6px 0 0;
  }
  .feedback-area.visible { display: flex; }
  .feedback-correct { color: var(--green); font-size: 15px; font-weight: 700; }
  .feedback-wrong { color: var(--red); font-size: 15px; font-weight: 700; }
  .feedback-explanation { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .next-btn {
    margin-top: 4px;
    padding: 10px 28px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: var(--transition);
    min-width: 160px;
  }
  .next-btn:hover { background: var(--primary-dark); }

  /* Results screen */
  .results-screen {
    background: var(--surface);
    border-radius: 20px;
    padding: 36px 28px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
  }
  .results-emoji { font-size: 56px; }
  .results-title { font-size: 22px; font-weight: 800; }
  .results-score-big { font-size: 48px; font-weight: 900; color: var(--primary); }
  .results-stats {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
  }
  .result-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .result-stat-num { font-size: 22px; font-weight: 800; }
  .result-stat-lbl { font-size: 11px; color: var(--text-muted); }
  .results-message { font-size: 14px; color: var(--text-muted); line-height: 1.7; max-width: 340px; }
  .results-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn-success { background: var(--green); color: white; border: none; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: var(--transition); }
  .btn-success:hover { opacity: 0.88; }

  /* Wrong answers review */
  .wrong-review {
    width: 100%;
    max-width: 620px;
    background: var(--surface);
    border-radius: 14px;
    padding: 18px;
    box-shadow: var(--shadow);
  }
  .wrong-review h4 { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .wrong-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .wrong-item:last-child { border-bottom: none; }
  .wrong-kanji-big { font-size: 32px; flex-shrink: 0; }
  .wrong-detail { flex: 1; font-size: 13px; }
  .wrong-q { color: var(--text-muted); font-size: 12px; }
  .wrong-answer { color: var(--green); font-weight: 700; }
  .wrong-yours { color: var(--red); font-size: 12px; }

  @media (max-width: 680px) {
    /* ─ 書き順タブ: 縦並びにするが高さは画面内に収める ─ */
    .main-layout {
      flex-direction: column;
      height: calc(100vh - 106px); /* デスクトップと同じ高さ制約を維持 */
      overflow: hidden;
    }

    /* ─ 書き順サイドバー: 固定高さでグリッドをスクロール ─ */
    .sidebar {
      width: 100%;
      min-width: unset;
      height: 200px;       /* 漢字グリッドをこの高さに収める */
      flex-shrink: 0;      /* アニメエリアを圧迫しない */
      border-right: none;
      border-bottom: 1px solid var(--border);
      overflow: hidden;    /* kanji-grid が内部でスクロール */
      padding: 0;
    }

    /* ─ クイズタブ: 高さautoで設定ボタンを全表示 ─ */
    #quizView { flex-direction: column; height: auto; }

    /* ─ クイズ設定サイドバー ─
       高さをautoにして全項目を表示。横並びレイアウトに変更。 */
    .quiz-sidebar {
      width: 100%;
      min-width: unset;
      height: auto;          /* 固定高さを解除 → ボタンが隠れない */
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      gap: 12px;
      overflow-y: visible;
    }

    /* 設定グループを横並びにしてコンパクトに */
    .quiz-sidebar > .quiz-setting-group:first-of-type {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* 問題タイプボタンを横並び */

let currentGrade = 0;
let searchQuery = '';
let selectedKanji = null;
let animationState = { strokes: [], currentStroke: -1, isPlaying: false, timer: null };

document.addEventListener('DOMContentLoaded', () => {
  renderKanjiGrid();
  buildQuizData();
});

function switchTab(tab) {
  document.getElementById('tabStroke').classList.toggle('active', tab === 'stroke');
  document.getElementById('tabQuiz').classList.toggle('active', tab === 'quiz');
  document.getElementById('strokeView').classList.toggle('active', tab === 'stroke');
  document.getElementById('quizView').classList.toggle('active', tab === 'quiz');
}

function selectGrade(grade) {
  currentGrade = grade;
  document.querySelectorAll('.grade-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.grade) === grade);
  });
  filterKanji();
}

function filterKanji() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  renderKanjiGrid();
}

function getFilteredKanji() {
  let list = KANJI_DATA;
  if (currentGrade > 0) list = list.filter(k => k.g === currentGrade);
  if (searchQuery) {
    list = list.filter(k =>
      k.k.includes(searchQuery) ||
      k.m.some(m => m.toLowerCase().includes(searchQuery)) ||
      k.on.some(r => r.includes(searchQuery)) ||
      k.kun.some(r => r.includes(searchQuery))
    );
  }
  return list;
}

function renderKanjiGrid() {
  const grid = document.getElementById('kanjiGrid');
  const list = getFilteredKanji();
  document.getElementById('kanjiCount').textContent = list.length + ' 字';
  grid.innerHTML = '';
  list.forEach(k => {
    const card = document.createElement('div');
    card.className = 'kanji-card' + (selectedKanji && selectedKanji.k === k.k ? ' selected' : '');
    card.title = k.m.join(', ');
    card.textContent = k.k;
    card.addEventListener('click', () => selectKanji(k));
    grid.appendChild(card);
  });
}

function selectKanji(kanji) {
  selectedKanji = kanji;
  renderKanjiGrid();
  loadKanjiAnimation(kanji);
}

async function loadKanjiAnimation(kanji) {
  const content = document.getElementById('mainContent');
  content.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><span>${kanji.k} の書き順データを読み込み中…</span></div>`;
  try {
    const url = `https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${kanji.cp}.svg`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('not found');
    const svgText = await resp.text();
    renderKanjiPanel(kanji, svgText);
  } catch (e) {
    content.innerHTML = `
      <div class="kanji-title-row"><div class="kanji-display">${kanji.k}</div><span class="grade-badge">${kanji.g}年</span></div>
      ${buildReadingsBox(kanji)}
      <div class="animation-wrap"><div class="error-msg">⚠ KanjiVGのデータが見つかりませんでした (${kanji.cp}.svg)<br><small>インターネット接続を確認してください。</small></div></div>`;
  }
}

function buildReadingsBox(kanji) {
  const onTags = kanji.on.map(r => `<span class="reading-tag onyomi">${r}</span>`).join('');
  const kunTags = kanji.kun.map(r => `<span class="reading-tag kunyomi">${r}</span>`).join('');
  const mTags = kanji.m.map(r => `<span class="reading-tag meaning">${r}</span>`).join('');
  return `<div class="readings-box">
    <div class="reading-group"><div class="reading-label">音読み</div><div class="reading-tags">${onTags||'<span style="color:#aaa;font-size:12px;">—</span>'}</div></div>
    <div class="reading-group"><div class="reading-label">訓読み</div><div class="reading-tags">${kunTags||'<span style="color:#aaa;font-size:12px;">—</span>'}</div></div>
    <div class="reading-group"><div class="reading-label">意味 (英語)</div><div class="reading-tags">${mTags||'<span style="color:#aaa;font-size:12px;">—</span>'}</div></div>
  </div>`;
}

function renderKanjiPanel(kanji, svgText) {
  const parser = new DOMParser();
  const svgDoc = parser.parseFromString(svgText, 'image/svg+xml');
  const allPaths = Array.from(svgDoc.querySelectorAll('path'));
  let strokePaths = allPaths.filter(p => (p.getAttribute('id')||'').match(/kvg:[0-9a-f]+-s\d+$/));
  if (strokePaths.length === 0) strokePaths = allPaths.filter(p => p.getAttribute('d'));
  const numStrokes = strokePaths.length;
  let dotsHtml = '';
  for (let i = 0; i < numStrokes; i++) dotsHtml += `<div class="stroke-dot" id="dot_${i}">${i+1}</div>`;
  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <div class="kanji-title-row"><div class="kanji-display">${kanji.k}</div><span class="grade-badge">${kanji.g}年生</span></div>
    ${buildReadingsBox(kanji)}
    <div class="animation-wrap">
      <div class="animation-header">
        <h3>✍ 書き順アニメーション</h3>
        <div class="stroke-counter" id="strokeCounter">0 / ${numStrokes} 画</div>
      </div>
      <div class="svg-container">
        <svg id="kanjiSvgDisplay" viewBox="0 0 109 109" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="stroke-progress" id="strokeProgress">${dotsHtml}</div>
      <div class="controls">
        <button class="btn btn-primary" id="playBtn" onclick="playAnimation()">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
          再生
        </button>
        <button class="btn btn-secondary" id="pauseBtn" onclick="pauseAnimation()" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16"><path d="M6 3.5a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-1 0V4a.5.5 0 0 1 .5-.5zm4 0a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-1 0V4a.5.5 0 0 1 .5-.5z"/></svg>
          一時停止
        </button>
        <button class="btn btn-secondary" onclick="resetAnimation()">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
          リセット
        </button>
        <div class="speed-control">
          <span>速度:</span>
          <select class="speed-select" id="speedSelect" onchange="changeSpeed()">
            <option value="2">遅い</option>
            <option value="1" selected>普通</option>
            <option value="0.6">速い</option>
            <option value="0.35">最速</option>
          </select>
        </div>
      </div>
    </div>`;
  animationState.strokes = strokePaths.map(p => p.getAttribute('d'));
  animationState.currentStroke = -1;
  animationState.isPlaying = false;
  setTimeout(() => playAnimation(), 350);
}

function getStrokeDuration() {
  const sel = document.getElementById('speedSelect');
  return sel ? parseFloat(sel.value) * 1000 : 1000;
}
function changeSpeed() { if (animationState.isPlaying) { pauseAnimation(); playAnimation(); } }
function playAnimation() {
  if (animationState.isPlaying) return;
  if (animationState.currentStroke >= animationState.strokes.length - 1) { resetAnimation(); return; }
  animationState.isPlaying = true;
  document.getElementById('playBtn').disabled = true;
  document.getElementById('pauseBtn').disabled = false;
  playNextStroke();
}
function pauseAnimation() {
  animationState.isPlaying = false;
  clearTimeout(animationState.timer);
  document.getElementById('playBtn').disabled = false;
  document.getElementById('pauseBtn').disabled = true;
}
function resetAnimation() {
  pauseAnimation();
  animationState.currentStroke = -1;
  const svg = document.getElementById('kanjiSvgDisplay');
  if (svg) svg.innerHTML = '';
  document.querySelectorAll('.stroke-dot').forEach(d => { d.className = 'stroke-dot'; });
  document.getElementById('strokeCounter').textContent = `0 / ${animationState.strokes.length} 画`;
  document.getElementById('playBtn').disabled = false;
  document.getElementById('pauseBtn').disabled = true;
}
function playNextStroke() {
  if (!animationState.isPlaying) return;
  const strokes = animationState.strokes;
  const nextIdx = animationState.currentStroke + 1;
  if (nextIdx >= strokes.length) {
    animationState.isPlaying = false;
    animationState.currentStroke = strokes.length - 1;
    document.getElementById('playBtn').disabled = false;
    document.getElementById('pauseBtn').disabled = true;
    return;
  }
  animationState.currentStroke = nextIdx;
  drawStroke(nextIdx, strokes[nextIdx]);
  updateStrokeUI(nextIdx);
  animationState.timer = setTimeout(() => playNextStroke(), getStrokeDuration());
}
function drawStroke(index, pathData) {
  const svg = document.getElementById('kanjiSvgDisplay');
  if (!svg) return;
  const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  pathEl.setAttribute('d', pathData);
  pathEl.setAttribute('fill', 'none');
  pathEl.setAttribute('stroke', '#1d4ed8');
  pathEl.setAttribute('stroke-width', '3.5');
  pathEl.setAttribute('stroke-linecap', 'round');
  pathEl.setAttribute('stroke-linejoin', 'round');
  pathEl.setAttribute('id', 'stroke_' + index);
  svg.appendChild(pathEl);
  const length = pathEl.getTotalLength ? pathEl.getTotalLength() : 200;
  pathEl.style.strokeDasharray = length;
  pathEl.style.strokeDashoffset = length;
  const duration = getStrokeDuration() * 0.85;
  const startTime = performance.now();
  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 2);
    pathEl.style.strokeDashoffset = length * (1 - eased);
    if (progress < 1) requestAnimationFrame(animate);
    else { pathEl.style.strokeDashoffset = 0; pathEl.style.transition = 'stroke 0.3s'; pathEl.style.stroke = '#1e40af'; }
  }
  requestAnimationFrame(animate);
  for (let i = 0; i < index; i++) {
    const prev = svg.querySelector('#stroke_' + i);
    if (prev) { prev.style.stroke = '#93c5fd'; prev.style.strokeWidth = '3'; }
  }
}
function updateStrokeUI(index) {
  const total = animationState.strokes.length;
  document.getElementById('strokeCounter').textContent = `${index + 1} / ${total} 画`;
  document.querySelectorAll('.stroke-dot').forEach((d, i) => {
    if (i < index) d.className = 'stroke-dot done';
    else if (i === index) d.className = 'stroke-dot current';
    else d.className = 'stroke-dot';
  });
}

// ── Reading helpers ──────────────────────────────────────────
/**
 * Normalise a single reading string.
 * Returns null if the reading should be discarded.
 */
function normalizeReading(r) {
  if (!r) return null;
  r = r.trim();
  // Discard suffix readings (start with -)
  if (r.startsWith('-')) return null;
  // Strip trailing prefix marker  e.g.  "ほ-" → "ほ"
  r = r.replace(/-$/, '');
  // Strip okurigana after dot  e.g.  "ひと.つ" → "ひと"
  r = r.replace(/\..+/, '');
  if (!r) return null;
  // Discard readings containing Latin/digits
  if (/[a-zA-Z0-9]/.test(r)) return null;
  // Katakana-only readings (onyomi-style): discard if length > 3
  // This filters loanword readings like リットル(立), メエトル(米), デシメートル(粉)
  const isKatakana = /^[\u30A1-\u30F6\u30FC\u30F4]+$/.test(r);
  if (isKatakana && r.length > 3) return null;
  // Hiragana / mixed: discard if unreasonably long
  if (!isKatakana && r.length > 6) return null;
  return r;
}

/**
 * Return { on: [...], kun: [...], all: [...] } for a kanji object.
 * All values are normalized; duplicates removed.
 */
function getValidReadings(k) {
  const on  = [...new Set((k.on  || []).map(normalizeReading).filter(Boolean))];
  const kun = [...new Set((k.kun || []).map(normalizeReading).filter(Boolean))];
  const all = [...new Set([...on, ...kun])];
  return { on, kun, all };
}

// ── KUN_BLACKLIST ─────────────────────────────────────────────
// Blacklist specific (kanji, kun-reading) pairs that are
// archaic, extremely rare, or pedagogically misleading.
const KUN_BLACKLIST = {
  '\u5e81': 'やくしょ'   // 庁: やくしょ is non-standard; おかみ is OK
};

// ── Grade / pool helpers ──────────────────────────────────────
function getQuizPool() {
  const grade = parseInt(document.getElementById('quizGradeSelect').value);
  quizGrade = grade;
  if (grade === 0) return KANJI_DATA;
  return KANJI_DATA.filter(k => k.g === grade);
}

function setQuizType(type) {
  quizType = type;
  ['reading','writing','mixed'].forEach(t => {
    const btn = document.getElementById('qt_' + t);
    if (btn) btn.classList.toggle('active', t === type);
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── Question generators ───────────────────────────────────────

/**
 * 音読み問題: show a kanji, choose the correct ONYOMI reading.
 * Distractors = first valid onyomi of other kanji.
 */
function generateOnyomiQuestion(pool) {
  const searchPool = pool.length >= 15 ? pool : KANJI_DATA;
  let kanji, on1, attempts = 0;
  do {
    kanji = randFrom(searchPool);
    const readings = getValidReadings(kanji);
    on1 = readings.on[0] || null;
    attempts++;
  } while (!on1 && attempts < 200);
  if (!on1) return generateReadingQuestion(pool);

  const allValidReadings = getValidReadings(kanji).all;

  const wrongSet = new Set();
  let tries = 0;
  while (wrongSet.size < 3 && tries < 300) {
    tries++;
    const other = randFrom(KANJI_DATA);
    if (other.k === kanji.k) continue;
    const otherOn = getValidReadings(other).on[0];
    if (!otherOn) continue;
    if (otherOn === on1) continue;
    if (allValidReadings.includes(otherOn)) continue;
    if (wrongSet.has(otherOn)) continue;
    wrongSet.add(otherOn);
  }
  if (wrongSet.size < 3) return generateReadingQuestion(pool);

  const options = shuffle([on1, ...wrongSet]);
  return {
    type: 'reading',
    readingKind: 'on',
    prompt: 'この漢字の音読みは？',
    display: kanji.k,
    correct: on1,
    options,
    explanation: `<strong>${kanji.k}</strong> の音読み：${getValidReadings(kanji).on.join('、')} ／ 意味：${kanji.m.slice(0,2).join('、')}`,
    kanji
  };
}

/**
 * 訓読み問題: show a kanji, choose the correct KUNYOMI reading.
 */
function generateKunyomiQuestion(pool) {
  const searchPool = pool.length >= 15 ? pool : KANJI_DATA;
  let kanji, kun1, attempts = 0;
  do {
    kanji = randFrom(searchPool);
    const readings = getValidReadings(kanji);
    // Apply blacklist
    const validKun = readings.kun.filter(r => KUN_BLACKLIST[kanji.k] !== r);
    kun1 = validKun[0] || null;
    attempts++;
  } while (!kun1 && attempts < 200);
  if (!kun1) return generateOnyomiQuestion(pool);

  const allValidReadings = getValidReadings(kanji).all;

  const wrongSet = new Set();
  let tries = 0;
  while (wrongSet.size < 3 && tries < 300) {
    tries++;
    const other = randFrom(KANJI_DATA);
    if (other.k === kanji.k) continue;
    const otherKun = getValidReadings(other).kun.filter(
      r => KUN_BLACKLIST[other.k] !== r
    )[0];
    if (!otherKun) continue;
    if (otherKun === kun1) continue;
    if (allValidReadings.includes(otherKun)) continue;
    if (wrongSet.has(otherKun)) continue;
    wrongSet.add(otherKun);
  }
  if (wrongSet.size < 3) return generateOnyomiQuestion(pool);

  const options = shuffle([kun1, ...wrongSet]);
  return {
    type: 'reading',
    readingKind: 'kun',
    prompt: 'この漢字の訓読みは？',
    display: kanji.k,
    correct: kun1,
    options,
    explanation: `<strong>${kanji.k}</strong> の訓読み：${getValidReadings(kanji).kun.join('、')} ／ 意味：${kanji.m.slice(0,2).join('、')}`,
    kanji
  };
}

/**
 * generateReadingQuestion: randomly pick onyomi or kunyomi question.
 */
function generateReadingQuestion(pool) {
  return Math.random() < 0.5
    ? generateOnyomiQuestion(pool)
    : generateKunyomiQuestion(pool);
}

/**
 * 書き問題: display an onyomi reading, choose the correct KANJI.
 * All 4 choices have DIFFERENT readings (no homophone distractors).
 *
 * Design:
 *   - 正解1:  表示読みを持つ漢字
 *   - 誤答3:  正解の読みを一切持たない漢字
 *
 * 書き問題: 読みから漢字を選ぶ。同読みの漢字は選択肢に含めない。
 */
function generateWritingQuestion(pool) {
  // 書き問題: 音読み or 訓読みから漢字を選ぶ（50:50）。
  // 訓読みは送り仮名付きで「まる（い）」形式で表示する。
  // 同読みの漢字を選択肢に含めると複数正解になるため除外。
  const searchPool = pool.length >= 20 ? pool : KANJI_DATA;

  let correct = null, correctReading = null, displayReading = null, readingKind = null;
  let attempts = 0;
  while (attempts < 400) {
    attempts++;
    const cand = randFrom(searchPool);
    const { on } = getValidReadings(cand);
    const useKun = Math.random() < 0.5;

    if (useKun) {
      // 訓読み: 元データ（ドット付き）から選ぶ
      const rawKunList = (cand.kun || []).filter(r => {
        if (!r || r.startsWith('-')) return false;
        const norm = normalizeReading(r);
        return norm && norm.length >= 2;
      });
      if (rawKunList.length === 0) {
        // 訓読みがなければ音読みで代替
        if (on.length === 0) continue;
        correct = cand;
        correctReading = on[Math.floor(Math.random() * on.length)];
        displayReading = correctReading;
        readingKind = 'on';
        break;
      }
      const rawKun = rawKunList[Math.floor(Math.random() * rawKunList.length)];
      const normKun = normalizeReading(rawKun);
      // 送り仮名表示: "くだ.る" → "くだ（る）" / "くに" → "くに"
      const dotIdx = rawKun.indexOf('.');
      const displayKun = dotIdx >= 0
        ? rawKun.slice(0, dotIdx) + '（' + rawKun.slice(dotIdx + 1) + '）'
        : normKun;
      correct = cand;
      correctReading = normKun;      // 重複チェック用（正規化済み）
      displayReading = displayKun;   // 画面表示用（送り仮名付き）
      readingKind = 'kun';
      break;
    } else if (on.length > 0) {
      // 音読みを使う
      correct = cand;
      correctReading = on[Math.floor(Math.random() * on.length)];
      displayReading = correctReading;
      readingKind = 'on';
      break;
    }
  }
  if (!correct) return generateReadingQuestion(pool);

  // 選択肢: 正解の読みと被らない漢字を3つ選ぶ（複数正解防止）
  const distractors = [];
  let tries = 0;
  while (distractors.length < 3 && tries < 400) {
    tries++;
    const other = randFrom(KANJI_DATA);
    if (other.k === correct.k) continue;
    const otherReadings = getValidReadings(other).all;
    if (otherReadings.includes(correctReading)) continue;
    if (distractors.some(d => d === other.k)) continue;
    distractors.push(other.k);
  }
  if (distractors.length < 3) return generateReadingQuestion(pool);

  const options = shuffle([correct.k, ...distractors]);
  const kindLabel = readingKind === 'kun' ? '訓読み' : '音読み';

  return {
    type: 'writing',
    readingKind,
    prompt: `この${kindLabel}の漢字はどれ？（意味のヒントを参考に）`,
    display: displayReading,          // 送り仮名付き表示
    hint: correct.m.slice(0, 2).join(' / '),
    correct: correct.k,
    options,
    explanation: `「${displayReading}」（${kindLabel}）と読む漢字は <strong>${correct.k}</strong>。意味：${correct.m.slice(0, 2).join('、')}`,
    kanji: correct
  };
}


function generateQuestion() {
  const pool = getQuizPool();
  if (pool.length === 0) return null;

  // ミックスは読み問題と書き問題の2タイプ
  const t = quizType === 'mixed'
    ? randFrom(['reading', 'writing'])
    : quizType;

  if (t === 'writing') return generateWritingQuestion(pool);
  return generateReadingQuestion(pool);
}

// ── Quiz control ─────────────────────────────────────────────
function startQuiz() {
  quizCount       = parseInt(document.getElementById('quizCountSelect').value);
  quizQuestions   = [];
  quizIndex       = 0;
  quizCorrect     = 0;
  quizWrong       = 0;
  quizWrongItems  = [];

  for (let i = 0; i < quizCount; i++) {
    let q = null, tries = 0;
    while (!q && tries < 30) { q = generateQuestion(); tries++; }
    if (q) quizQuestions.push(q);
  }

  if (quizQuestions.length === 0) {
    alert('条件に合う問題が見つかりませんでした。学年の設定を変えてみてください。');
    return;
  }

  document.getElementById('scoreCard').style.display = '';
  updateScoreDisplay();
  showQuestion(0);
}

function showQuestion(idx) {
  if (idx >= quizQuestions.length) { showResults(); return; }
  const q = quizQuestions[idx];
  const optLabels   = ['ア', 'イ', 'ウ', 'エ'];
  // Type label & badge
  let typeLabel, typeBadgeClass;
  if (q.type === 'reading') {
    typeLabel      = q.readingKind === 'kun' ? '訓読み問題' : '音読み問題';
    typeBadgeClass = q.readingKind === 'kun' ? 'badge-kun' : 'badge-reading';
  } else {
    // 書き問題でも音/訓を区別して表示
    if (q.readingKind === 'kun') {
      typeLabel      = '書き問題（訓）';
      typeBadgeClass = 'badge-writing';
    } else {
      typeLabel      = '書き問題（音）';
      typeBadgeClass = 'badge-writing';
    }
  }

  let displayHtml = '';
  if (q.type === 'reading') {
    displayHtml = `<div class="question-kanji">${q.display}</div>`;
  } else {
    displayHtml = `<div class="question-reading-big">${q.display}</div>
      <div class="question-hint">意味のヒント：<strong>${q.hint}</strong></div>`;
  }

  const bigFont = (q.type === 'writing');

  // Use data-answer attribute so answerQuestion can compare precisely
  const optionsHtml = q.options.map((opt, i) => {
    const escaped = opt.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return `
    <button class="option-btn" data-answer="${opt}"
      onclick="answerQuestion('${escaped}', this)"
      style="${bigFont ? 'font-size:28px;' : 'font-size:15px;'}">
      <span class="option-label">${optLabels[i]}</span>
      ${opt}
    </button>`;
  }).join('');

  const html = `
    <div class="question-card">
      <div class="question-meta">
        <span class="question-type-badge ${typeBadgeClass}">${typeLabel}</span>
        <span class="q-progress">第 ${idx + 1} / ${quizQuestions.length} 問</span>
      </div>
      <div class="question-body">
        <div class="question-prompt">${q.prompt}</div>
        ${displayHtml}
      </div>
      <div class="options-grid">${optionsHtml}</div>
      <div class="feedback-area" id="feedbackArea">
        <div id="feedbackText"></div>
        <div class="feedback-explanation" id="feedbackExplanation"></div>
        <button class="next-btn" onclick="nextQuestion()">
          ${idx + 1 < quizQuestions.length ? '次の問題 →' : '結果を見る 📊'}
        </button>
      </div>
    </div>
  `;
  document.getElementById('quizMain').innerHTML = html;
}

/**
 * answerQuestion – compare via data-answer attribute to avoid text-scraping bugs.
 */
function answerQuestion(answer, btn) {
  const q = quizQuestions[quizIndex];
  // Disable all buttons to prevent double-click
  document.querySelectorAll('.option-btn').forEach(b => { b.disabled = true; });

  const isCorrect = answer === q.correct;

  // Highlight buttons using data-answer
  document.querySelectorAll('.option-btn').forEach(b => {
    const bAnswer = b.getAttribute('data-answer');
    if (bAnswer === q.correct) {
      b.classList.add('correct');
    } else if (b === btn && !isCorrect) {
      b.classList.add('wrong');
    } else {
      b.classList.add('dimmed');
    }
  });

  const feedbackArea       = document.getElementById('feedbackArea');
  const feedbackText       = document.getElementById('feedbackText');
  const feedbackExplanation = document.getElementById('feedbackExplanation');

  if (isCorrect) {
    quizCorrect++;
    feedbackText.innerHTML = '<span class="feedback-correct">✓ 正解！</span>';
  } else {
    quizWrong++;
    feedbackText.innerHTML = `<span class="feedback-wrong">✗ 不正解。正解は「${q.correct}」</span>`;
    quizWrongItems.push(q);
  }

  feedbackExplanation.innerHTML = q.explanation;
  feedbackArea.classList.add('visible');
  updateScoreDisplay();

  // スマホで「次の問題」ボタンが画面外に出ないようスクロール
  setTimeout(() => {
    feedbackArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 80);
}

function nextQuestion() {
  quizIndex++;
  showQuestion(quizIndex);
}

function updateScoreDisplay() {
  const total   = quizCorrect + quizWrong;
  const pct     = total > 0 ? Math.round(quizCorrect / total * 100) : 0;
  document.getElementById('scoreDisplay').textContent = pct + '%';
  document.getElementById('correctCount').textContent = '✓ ' + quizCorrect;
  document.getElementById('wrongCount').textContent   = '✗ ' + quizWrong;
  const progress = quizQuestions.length > 0
    ? (quizIndex / quizQuestions.length * 100) : 0;
  document.getElementById('progressBar').style.width = progress + '%';
}

function showResults() {
  const total = quizCorrect + quizWrong;
  const pct   = total > 0 ? Math.round(quizCorrect / total * 100) : 0;
  let emoji, msg;
  if (pct === 100) { emoji = '🏆'; msg = '満点です！素晴らしい！全問正解おめでとうございます。'; }
  else if (pct >= 80) { emoji = '🌟'; msg = '優秀な成績です！あと少しで満点です。'; }
  else if (pct >= 60) { emoji = '👍'; msg = 'まずまずの成績です。もう少し練習しましょう！'; }
  else { emoji = '📚'; msg = '復習が必要です。間違えた漢字をしっかり確認しましょう。'; }

  let wrongReviewHtml = '';
  if (quizWrongItems.length > 0) {
    const items = quizWrongItems.slice(0, 10).map(q => `
      <div class="wrong-review-item">
        <span class="wrong-review-kanji">${q.display}</span>
        <span class="wrong-review-correct">正解: ${q.correct}</span>
        <span class="wrong-review-meaning">${q.kanji ? q.kanji.m.slice(0,2).join('、') : ''}</span>
      </div>
    `).join('');
    wrongReviewHtml = `
      <div class="wrong-review-section">
        <h3>間違えた問題 (${Math.min(quizWrongItems.length, 10)}件)</h3>
        ${items}
      </div>
    `;
  }

  const html = `
    <div class="results-screen">
      <div class="results-emoji">${emoji}</div>
      <div class="results-score">${pct}%</div>
      <div class="results-detail">${quizCorrect}問正解 / ${total}問中</div>
      <div class="results-message">${msg}</div>
      ${wrongReviewHtml}
      <div class="results-actions">
        <button class="btn btn-primary" onclick="startQuiz()">もう一度</button>
        ${quizWrongItems.length > 0
          ? '<button class="btn btn-secondary" onclick="reviewWrongAnswers()">間違いのみ再出題</button>'
          : ''}
      </div>
    </div>
  `;
  document.getElementById('quizMain').innerHTML = html;
  document.getElementById('scoreCard').style.display = 'none';
}

function reviewWrongAnswers() {
  quizQuestions   = [...quizWrongItems];
  quizIndex       = 0;
  quizCorrect     = 0;
  quizWrong       = 0;
  quizWrongItems  = [];
  document.getElementById('scoreCard').style.display = '';
  updateScoreDisplay();
  showQuestion(0);
}

</script>
</body>
</html>
